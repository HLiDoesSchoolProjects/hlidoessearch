<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>HLiDoesSearch</title>
    <style>
        :root {
            color-scheme: light dark;
        }
        body {
            margin: 0;
            color: light-dark(#060606, #f0f0f0);
            background-color: light-dark(#fafafa, #202020);
            font-family: sans-serif;
            overflow-y: scroll;
            transform: rotate(0deg);
            transform-origin: center 50vh;
            transition: transform 2500ms ease;
        }
        p {
            margin: 0;
        }
        #top-section {
            height: 6rem;
            padding-inline: 3rem;
            padding-block: 1.5rem;
            box-sizing: border-box;
            border-bottom: 1px solid light-dark(#dddddd, #343434);
            transition: 350ms cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            flex-flow: row nowrap;
            gap: 1.5rem;
            align-items: center;
            justify-content: start;
        }
        .initial-styles #top-section {
            height: 100svh;
        }
        #interaction-box {
            max-width: 75vw;
            transition: 350ms cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-flow: row nowrap;
            gap: 1.5rem;
            align-items: center;
            justify-content: start;
        }
        .initial-styles #interaction-box {
            flex-flow: column nowrap;
            margin-left: 50%;
            translate: -50% -35%;
        }
        #logo {
            user-select: none;
            cursor: pointer;
            transition: 350ms cubic-bezier(0.25, 1, 0.5, 1);
        }
        .initial-styles #logo {
            font-size: x-large;
        }
        #search-box {
            width: 30rem;
            max-width: 100%;
            height: 3rem;
            padding-inline: 1rem;
            background-color: light-dark(#ffffff, #444444);
            border-radius: calc(1px * Infinity);
            box-shadow: 0 0.25rem 0.75rem light-dark(#aaaaaa66, #11111166);
            font-size: large;
            display: flex;
            flex-flow: row nowrap;
            align-items: center;
            justify-content: space-between;
        }
        #search-box-input {
            flex: 1;
            height: 2rem;
            color: light-dark(#060606, #f0f0f0);
            background-color: transparent;
            border: none;
            outline: none;
        }
        #search-box-button {
            width: 36px;
            height: 36px;
            border: none;
            background-color: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #search-box-button svg {
            width: 24px;
            height: 24px;
            stroke: light-dark(#060606, #dddddd);
        }
        #search-box-button svg:active {
            stroke: light-dark(#555555, #aaaaaa);
        }

        #mode-switcher {
            margin-left: 0.3rem;
            color: light-dark(#666666, #a0a0a0);
            font-size: small;
            display: flex;
            flex-flow: row nowrap;
            align-items: center;
            gap: 0.45rem;
        }
        #mode-toggle {
            --toggle-width: 2.15rem;
            --toggle-height: 1.2rem;
            --toggle-padding: 0.12rem;
            --toggle-checked-left: 1.05rem;
            --toggle-knob-size: 0.85rem;
            position: relative;
            width: var(--toggle-width);
            height: var(--toggle-height);
            border-radius: 999px;
            border: 1px solid light-dark(#cccccc, #333333);
            background-color: light-dark(#dddddd, #444444);
            transition: background-color 150ms ease;
            appearance: none;
            -webkit-appearance: none;
            outline: none;
            cursor: pointer;
        }
        #mode-toggle::before {
            content: "";
            position: absolute;
            width: var(--toggle-knob-size);
            height: var(--toggle-knob-size);
            top: 50%;
            left: var(--toggle-padding);
            border-radius: 50%;
            background-color: light-dark(#fafafa, #dddddd);
            box-shadow: 0 1px 2px light-dark(#00000033, #00000033);
            transform: translateY(-50%);
            transition: left 150ms ease;
        }
        #mode-toggle:checked {
            background-color: light-dark(#7fa46f, #5a7a50);
            border-color: light-dark(#6f9460, #3a4e33);
        }
        #mode-toggle:checked::before {
            left: var(--toggle-checked-left);
        }
        #mode-text {
            min-width: 3.75rem;
        }

        #middle-section {
            display: none;
            padding-inline: 3rem;
            padding-bottom: 6rem;
        }
        #results-info {
            margin-block: 1rem;
            color: light-dark(#666666, #a0a0a0);
            font-size: small;
        }
        #autocorrect-info {
            display: none;
            margin-block: 1rem;
        }
        #autocorrect-info a {
            font-style: italic;
        }
        #results-container {
            max-width: 42rem;
        }

        .result {
            margin-top: 2rem;
            display: flex;
            flex-flow: column nowrap;
            align-items: start;
            gap: 0.5rem;
        }
        .result.clustered {
            margin-top: 1.5rem;
            padding-left: 1.5rem;
            border-left: 3px solid light-dark(#eeeeee, #444444);
        }
        .result b {
            font-weight: 500;
        }
        .domain-group {
            color: light-dark(#666666, #a0a0a0);
            display: flex;
            flex-flow: row nowrap;
            align-items: center;
            gap: 0.5rem;
        }
        .favicon {
            width: 16px;
            height: 16px;
            border-radius: 3px;
        }
        .domain {
            font-size: small;
        }
        .link {
            font-size: larger;
        }
        .description {
            font-size: small;
        }
        .metadata {
            color: light-dark(#666666, #a0a0a0);
            font-size: small;
        }

        .intro-animation {
            opacity: 0;
            translate: 0 15px;
            animation-duration: 400ms;
            animation-name: intro;
            animation-fill-mode: forwards;
            animation-timing-function: ease;
        }
        @keyframes intro {
            0% {
                opacity: 0;
                translate: 0 15px;
            }
            100% {
                opacity: 1;
                translate: 0 0;
            }
        }

        @media (min-width: 64rem) {
            #top-section {
                padding-inline: 5rem;
            }
            #middle-section {
                padding-inline: 5rem;
            }
        }
        @media (min-width: 80rem) {
            #middle-section {
                padding-left: 14rem;
            }
        }
    </style>
</head>
<body class="initial-styles">
    <div id="top-section">
        <div id="interaction-box">
            <span id="logo" onclick="logoClick()">HLiDoes<b>Search</b></span>
            <div id="search-box">
                <input id="search-box-input" type="text" autofocus />
                <button onclick="search()" id="search-box-button">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                    </svg>
                </button>
            </div>
            <div id="mode-switcher">
                <input id="mode-toggle" type="checkbox" aria-label="Toggle Advanced engine" />
                <span id="mode-text">Classic</span>
            </div>
        </div>
    </div>
    <div id="middle-section">
        <p id="results-info"></p>
        <p id="autocorrect-info">Did you mean: <a href="javascript:;">recursion</a>?</p>
        <div id="results-container"></div>
    </div>

    <template id="result-template">
        <div class="result intro-animation">
            <div class="domain-group">
                <img class="favicon" src="" alt="" onerror="this.outerHTML='<svg class=\'favicon\' xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><circle cx=\'12\' cy=\'12\' r=\'10\'></circle><line x1=\'2\' y1=\'12\' x2=\'22\' y2=\'12\'></line><path d=\'M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z\'></path></svg>';" />
                <p class="domain"></p>
            </div>
            <a class="link" href="#"></a>
            <p class="description"></p>
            <p class="metadata"></p>
        </div>
    </template>

    <script>
        const topSection = document.getElementById("top-section");
        const searchBoxInput = document.getElementById("search-box-input");
        const modeToggle = document.getElementById("mode-toggle");
        const modeText = document.getElementById("mode-text");
        const middleSection = document.getElementById("middle-section");
        const resultsInfo = document.getElementById("results-info");
        const autocorrectInfo = document.getElementById("autocorrect-info");
        const resultsContainer = document.getElementById("results-container");
        const resultTemplate = document.getElementById("result-template");

        // https://stackoverflow.com/a/7382028
        function htmlEscape(text) {
            return String(text)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        // ai-assisted
        function highlightMatch(text, tokens) {
            if (!tokens || tokens.length === 0 || !text) return htmlEscape(text);
            const pattern = tokens.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join("|");
            const regex = new RegExp(`(${pattern})`, "gi");

            const parts = String(text).split(regex);
            let result = "";
            for (let i = 0; i < parts.length; i++) {
                if (i % 2 === 1) {
                    result += `<b>${htmlEscape(parts[i])}</b>`;
                } else {
                    result += htmlEscape(parts[i]);
                }
            }
            return result;
        }

        /* Logo */
        let logoClickedCount = 0;
        function logoClick() {
            searchBoxInput.value = "";
            search();
            if (++logoClickedCount === 10) {
                document.querySelector("#logo b").innerHTML = "NotClickOnRandomLogos";
            }
        }

        /* Search box */
        searchBoxInput.addEventListener("keydown", async event => {
            if (event.key === "Enter") {
                await search();
            }
        });

        window.addEventListener("keydown", event => {
            if (event.key === "/" && (document.activeElement.tagName !== "INPUT" && document.activeElement.tagName !== "TEXTAREA")) {
                event.preventDefault();
                searchBoxInput.focus();
            }
        });

        /* Mode switcher */
        function getCurrentMode() {
            return modeToggle.checked ? "bm25" : "classic";
        }
        function updateModeText() {
            modeText.textContent = modeToggle.checked ? "Advanced" : "Classic";
        }

        const MODE_STORAGE_KEY = "hlidoessearch_mode";
        const storedMode = localStorage.getItem(MODE_STORAGE_KEY);
        modeToggle.checked = storedMode === "bm25";
        updateModeText();
        modeToggle.addEventListener("change", () => {
            updateModeText();
            localStorage.setItem(MODE_STORAGE_KEY, getCurrentMode());
            search();
        });

        /** Search data from API */
        let proceedToHideMiddleSection = true;
        async function search() {
            const query = searchBoxInput.value.trim();
            searchBoxInput.value = query;
            const lowerCaseQuery = query.toLowerCase();

            // Page styling
            if (query) {
                resultsInfo.innerHTML = "";
                autocorrectInfo.style.display = "none";
                resultsContainer.innerHTML = "";
                proceedToHideMiddleSection = false;
                middleSection.style.display = "block";
                searchBoxInput.blur();
                document.body.classList.remove("initial-styles");
                document.title = `${query} - HLiDoesSearch`;
            } else {
                document.body.classList.add("initial-styles");
                // preserve the links sliding-down effect and prevent visual lag of hiding a very long element
                proceedToHideMiddleSection = true;
                setTimeout(() => {
                    if (proceedToHideMiddleSection) {
                        middleSection.style.display = "none";
                    }
                }, 350);
                document.title = "HLiDoesSearch";
                return;
            }

            // Fetching
            let responseData;
            try {
                const searchResponse = await fetch("/api/search?" + new URLSearchParams({
                    q: query,
                    count: 50,
                    mode: getCurrentMode()
                }).toString());
                responseData = await searchResponse.json();
            } catch (error) {
                resultsInfo.innerHTML = "Could not complete the search due to error";
                return;
            }

            // Displaying
            resultsInfo.innerHTML = `Got ${responseData.resultsCount} ${responseData.resultsCount === 1 ? "result" : "results"} in ${(responseData.timeTookMs / 1000).toFixed(1)} seconds`;
            const isRelevanceDecimalNumber = getCurrentMode() === "bm25";
            let resultNum = 0;
            let resultDelay = 0;
            let lastDomain = "";
            const highlightTokens = [...lowerCaseQuery.matchAll(/"([^"]+)"/g)].map(m => m[1])
                .concat(lowerCaseQuery.replace(/"/g, '').split(/\s+/))
                .filter(w => w.length > 0)
                .toSorted((a, b) => b.length - a.length);
            for (const searchResult of responseData.results) {
                const url = new URL(searchResult.link);
                const hostname = url.hostname.startsWith("www.") ? url.hostname.slice(4) : url.hostname;

                const resultFragment = resultTemplate.content.cloneNode(true);
                if (hostname === lastDomain) {
                    resultFragment.children[0].classList.add("clustered");
                    resultFragment.querySelector(".domain-group").style.display = "none";
                } else {
                    resultFragment.querySelector(".favicon").src = `/api/favicon?domain=${encodeURIComponent(url.hostname)}`;
                    resultFragment.querySelector(".domain").innerHTML = hostname;
                }
                resultFragment.querySelector(".link").innerHTML = highlightMatch(searchResult.title, highlightTokens);
                resultFragment.querySelector(".link").href = searchResult.link;
                resultFragment.querySelector(".description").innerHTML = highlightMatch(searchResult.description, highlightTokens);
                resultFragment.querySelector(".metadata").innerHTML = `Relevance: ${isRelevanceDecimalNumber ? searchResult.score.toFixed(4) : searchResult.score} | Fetch Date: ${new Date(searchResult.date).toDateString()}`;
                resultFragment.children[0].style.animationDelay = `${resultDelay}ms`;
                resultDelay += Math.max(0, 40 - resultNum++);
                resultsContainer.appendChild(resultFragment);

                lastDomain = hostname;
            }

            // Easter eggs
            switch (lowerCaseQuery) {
                case "recursion":
                    didYouMean("recursion");
                    break;
                case "anagram":
                    didYouMean("nag a ram");
                    break;
                case "define anagram":
                    didYouMean("nerd frame again");
                    break;
                case "google":
                    didYouMean("HLiDoesSearch");
                    break;
                case "hlidoessearch":
                    didYouMean("here", "");
                    break;
            }

            if (lowerCaseQuery.includes("do a barrel roll")) {
                document.body.style.transition = "transform 0ms ease";
                document.body.style.transform = "rotate(0deg)";
                setTimeout(() => {
                    document.body.style.transition = "transform 2500ms ease";
                    document.body.style.transform = "rotate(360deg)";
                }, 10);
                resultsInfo.innerHTML = "Okay";
            } else if (lowerCaseQuery === "askew") {
                document.body.style.transition = "transform 500ms ease";
                document.body.style.transform = "rotate(2deg)";
            }
        }

        /** Display the autocorrect element */
        function didYouMean(displayText, searchText = displayText) {
            const linkElement = autocorrectInfo.querySelector("a");
            linkElement.innerHTML = displayText;
            linkElement.onclick = () => {
                searchBoxInput.value = searchText;
                search();
                return false;
            };
            autocorrectInfo.style.display = "block";
        }
    </script>
</body>
</html>
